<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek AI · 多对话 + 夜间模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 夜间模式变量 */
        :root {
            --bg-gradient-start: #f5f7fc;
            --bg-gradient-end: #eef2f8;
            --card-bg: rgba(255,255,255,0.92);
            --sidebar-bg: rgba(255,255,255,0.96);
            --border-color: #eef2f8;
            --text-primary: #1f2a44;
            --text-secondary: #5e6f8d;
            --bubble-user: #1e6f5c;
            --bubble-user-text: white;
            --bubble-assistant: #eff3f8;
            --bubble-assistant-text: #1a2c3e;
            --input-bg: #ffffff;
            --input-border: #dce5ec;
            --button-primary: #1e6f5c;
            --button-disabled: #bbcfda;
            --error-bg: #ffe8e6;
            --error-text: #c23d2e;
            --footer-text: #9dafc4;
            --conv-item-bg: #f8fafd;
            --conv-active-bg: #e6f4f0;
        }

        body.dark {
            --bg-gradient-start: #1a1e2c;
            --bg-gradient-end: #0f1119;
            --card-bg: rgba(30,34,48,0.95);
            --sidebar-bg: #1e2230;
            --border-color: #2a2e3e;
            --text-primary: #eef2ff;
            --text-secondary: #9aa4bf;
            --bubble-user: #2d8f7a;
            --bubble-user-text: white;
            --bubble-assistant: #2a2e3e;
            --bubble-assistant-text: #e2e8f0;
            --input-bg: #25293b;
            --input-border: #3a3f54;
            --button-primary: #2d8f7a;
            --button-disabled: #3a4055;
            --error-bg: #3b2a2a;
            --error-text: #f9a69a;
            --footer-text: #6e768f;
            --conv-item-bg: #25293b;
            --conv-active-bg: #2d3b3a;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 16px 12px 24px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        .app-layout {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .conversation-sidebar {
            background: var(--sidebar-bg);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            width: 280px;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .sidebar-header {
            padding: 18px 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .sidebar-header h3 { font-size: 1.1rem; color: var(--text-primary); }
        .new-chat-btn {
            background: var(--button-primary);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .new-chat-btn:active { transform: scale(0.96); opacity: 0.85;}

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            max-height: 65vh;
            padding: 8px 0;
        }
        .conv-item {
            padding: 14px 16px;
            margin: 4px 10px;
            border-radius: 24px;
            background: var(--conv-item-bg);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }
        .conv-item.active {
            background: var(--conv-active-bg);
            border-color: var(--button-primary);
        }
        .conv-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .conv-delete {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .chat-main {
            flex: 1;
            min-width: 260px;
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .settings-bar {
            background: var(--input-bg);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }
        .api-simple {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .api-simple input, .model-select {
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.8rem;
        }
        .dark-mode-toggle {
            background: var(--conv-item-bg);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .sidebar-toggle {
            background: var(--conv-item-bg);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .chat-area {
            background: var(--card-bg);
            padding: 20px 16px;
            height: 460px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeSlideUp 0.2s ease;
            position: relative;
        }
        .message.user { align-items: flex-end; align-self: flex-end; }
        .message.assistant { align-items: flex-start; align-self: flex-start; }
        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
        }
        .user .bubble { background: var(--bubble-user); color: var(--bubble-user-text); border-bottom-right-radius: 6px; }
        .assistant .bubble { background: var(--bubble-assistant); color: var(--bubble-assistant-text); border-bottom-left-radius: 6px; }
        .msg-time { font-size: 0.65rem; color: var(--text-secondary); margin-top: 5px; margin-left: 8px; margin-right: 8px; }
        .msg-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            margin-left: 12px;
            font-size: 0.7rem;
        }
        .msg-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .msg-actions button:active { background: var(--conv-item-bg); }

        .input-bar {
            padding: 16px 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--card-bg);
        }
        .input-bar textarea {
            flex: 1;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .input-bar button {
            background: var(--button-primary);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            cursor: pointer;
        }
        .input-bar button:disabled { background: var(--button-disabled); }

        .typing-indicator {
            background: var(--bubble-assistant);
            padding: 12px 18px;
            border-radius: 24px;
            display: inline-flex;
            gap: 6px;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse { 0%,80%,100%{transform:scale(0.6); opacity:0.5;} 40%{transform:scale(1); opacity:1;} }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }

        .error-tip {
            background: var(--error-bg);
            color: var(--error-text);
            border-radius: 28px;
            padding: 8px 14px;
            font-size: 0.75rem;
            text-align: center;
            margin: 0 16px 8px;
        }
        .footer-note {
            font-size: 0.65rem;
            text-align: center;
            color: var(--footer-text);
            padding: 12px;
            border-top: 1px solid var(--border-color);
        }
        @media (max-width: 680px) {
            .sidebar-toggle { display: inline-block; }
            .conversation-sidebar { position: fixed; top: 0; left: -280px; z-index: 1000; height: 100vh; border-radius: 0; transition: left 0.2s; width: 280px; background: var(--sidebar-bg); }
            .conversation-sidebar.open { left: 0; }
            .sidebar-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
            .sidebar-overlay.open { display: block; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="conversation-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>📋 对话列表</h3>
            <button class="new-chat-btn" id="newChatBtn">+ 新建</button>
        </div>
        <div class="conversation-list" id="convList"></div>
    </div>

    <div class="chat-main">
        <div class="settings-bar">
            <div class="api-simple">
                <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" style="width:180px;">
                <select id="modelSelect">
                    <option value="deepseek-chat">deepseek-chat</option>
                    <option value="deepseek-coder">deepseek-coder</option>
                </select>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="dark-mode-toggle" id="darkModeToggle">🌙 夜间模式</button>
                <button class="sidebar-toggle" id="toggleSidebarBtn">📋 列表</button>
            </div>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="input-bar">
            <textarea id="userInput" rows="1" placeholder="输入消息... (支持编辑/重试)"></textarea>
            <button id="sendBtn">➤</button>
        </div>
        <div class="footer-note">💡 每条消息可编辑/重新生成 | 夜间模式自动保存</div>
    </div>
</div>

<script>
    // ---------- 多对话 + 编辑/重新生成 ----------
    let conversations = {};
    let currentConvId = null;
    let isLoading = false;
    // 临时存储正在编辑的消息
    let editingContext = null; // { convId, msgIndex, oldContent }

    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelSelect = document.getElementById('modelSelect');
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const convListDiv = document.getElementById('convList');
    const newChatBtn = document.getElementById('newChatBtn');
    const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const sidebar = document.getElementById('sidebar');
    const darkModeToggle = document.getElementById('darkModeToggle');

    // 夜间模式
    function initDarkMode() {
        const saved = localStorage.getItem('dark_mode');
        if (saved === 'enabled') {
            document.body.classList.add('dark');
            darkModeToggle.textContent = '☀️ 日间模式';
        } else {
            darkModeToggle.textContent = '🌙 夜间模式';
        }
    }
    function toggleDarkMode() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('dark_mode', 'disabled');
            darkModeToggle.textContent = '🌙 夜间模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('dark_mode', 'enabled');
            darkModeToggle.textContent = '☀️ 日间模式';
        }
    }
    darkModeToggle.addEventListener('click', toggleDarkMode);

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getCurrentTimeString() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function saveAll() {
        localStorage.setItem('deepseek_multi_convs_v2', JSON.stringify(conversations));
        localStorage.setItem('deepseek_current_conv_v2', currentConvId);
    }

    function loadConversations() {
        const stored = localStorage.getItem('deepseek_multi_convs_v2');
        if(stored) { try { conversations = JSON.parse(stored); } catch(e){} }
        const savedCurr = localStorage.getItem('deepseek_current_conv_v2');
        if(savedCurr && conversations[savedCurr]) currentConvId = savedCurr;
        if(Object.keys(conversations).length === 0) createNewConversation('新对话');
        else if(!currentConvId) currentConvId = Object.keys(conversations)[0];
        renderConvList();
        renderCurrentChat();
    }

    function createNewConversation(title='新对话') {
        const id = generateId();
        conversations[id] = { id, title: title+'_'+(Object.keys(conversations).length+1), messages: [], updatedAt: Date.now() };
        currentConvId = id;
        saveAll();
        renderConvList();
        renderCurrentChat();
        closeSidebar();
    }

    function deleteConversation(convId) {
        if(Object.keys(conversations).length === 1) { createNewConversation('新对话'); delete conversations[convId]; }
        else delete conversations[convId];
        if(currentConvId === convId) currentConvId = Object.keys(conversations)[0];
        saveAll();
        renderConvList();
        renderCurrentChat();
    }

    function renderConvList() {
        convListDiv.innerHTML = '';
        Object.values(conversations).sort((a,b)=>b.updatedAt - a.updatedAt).forEach(conv => {
            const div = document.createElement('div');
            div.className = 'conv-item' + (currentConvId === conv.id ? ' active' : '');
            div.innerHTML = `<div class="conv-title">${escapeHtml(conv.title)}</div><button class="conv-delete" data-id="${conv.id}">🗑️</button>`;
            div.addEventListener('click', (e) => { if(e.target.classList.contains('conv-delete')) return; currentConvId = conv.id; saveAll(); renderConvList(); renderCurrentChat(); closeSidebar(); });
            div.querySelector('.conv-delete').addEventListener('click', (e) => { e.stopPropagation(); if(confirm('删除对话？')) deleteConversation(conv.id); });
            convListDiv.appendChild(div);
        });
    }

    // 渲染当前聊天 (带编辑/重新生成按钮)
    function renderCurrentChat() {
        if(!currentConvId || !conversations[currentConvId]) return;
        const conv = conversations[currentConvId];
        chatArea.innerHTML = '';
        if(conv.messages.length === 0) {
            chatArea.innerHTML = `<div class="message assistant"><div class="bubble">✨ 多对话 + 夜间模式 + 编辑/重试<br>点击消息旁的按钮即可编辑或重新生成~</div><div class="msg-time">${getCurrentTimeString()}</div></div>`;
        } else {
            conv.messages.forEach((msg, idx) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role}`;
                msgDiv.innerHTML = `
                    <div class="bubble">${escapeHtml(msg.content)}</div>
                    <div class="msg-time">${msg.time || getCurrentTimeString()}</div>
                    <div class="msg-actions">
                        ${msg.role === 'user' ? `<button class="edit-msg" data-index="${idx}">✏️ 编辑</button>` : `<button class="regenerate-msg" data-index="${idx}">🔄 重新生成</button>`}
                    </div>
                `;
                chatArea.appendChild(msgDiv);
            });
        }
        // 绑定编辑/重试事件
        document.querySelectorAll('.edit-msg').forEach(btn => {
            btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.index); editMessage(idx); });
        });
        document.querySelectorAll('.regenerate-msg').forEach(btn => {
            btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.index); regenerateAnswer(idx); });
        });
        scrollToBottom();
    }

    async function editMessage(msgIndex) {
        if(isLoading) { showErrorToast("请等待回复完成"); return; }
        const conv = conversations[currentConvId];
        if(!conv || !conv.messages[msgIndex] || conv.messages[msgIndex].role !== 'user') return;
        const oldMsg = conv.messages[msgIndex];
        const newContent = prompt("编辑你的消息:", oldMsg.content);
        if(newContent === null || newContent.trim() === '') return;
        // 删除该消息之后的所有消息 (包括AI回复)
        conv.messages = conv.messages.slice(0, msgIndex);
        saveAll();
        renderCurrentChat();
        // 模拟发送新消息
        addMessageToCurrent('user', newContent.trim(), true);
        await callAndAddAssistant();
    }

    async function regenerateAnswer(msgIndex) {
        if(isLoading) { showErrorToast("请等待"); return; }
        const conv = conversations[currentConvId];
        if(!conv || !conv.messages[msgIndex] || conv.messages[msgIndex].role !== 'assistant') return;
        // 找到前一条用户消息的索引
        let userIdx = -1;
        for(let i=msgIndex-1; i>=0; i--) { if(conv.messages[i].role === 'user') { userIdx = i; break; } }
        if(userIdx === -1) { showErrorToast("无法找到对应的用户消息"); return; }
        const userMsg = conv.messages[userIdx].content;
        // 删除从user消息之后的所有消息 (包括这条assistant)
        conv.messages = conv.messages.slice(0, userIdx);
        saveAll();
        renderCurrentChat();
        addMessageToCurrent('user', userMsg, true);
        await callAndAddAssistant();
    }

    async function callAndAddAssistant() {
        if(!currentConvId) return;
        const conv = conversations[currentConvId];
        const apiKey = apiKeyInput.value.trim();
        if(!apiKey) { showErrorToast("请填写API Key"); return; }
        const model = modelSelect.value;
        const history = conv.messages.slice(-20).map(m => ({ role: m.role, content: m.content }));
        isLoading = true; sendBtn.disabled = true; showLoading();
        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model, messages: [{ role:"system", content:"You are a helpful assistant."}, ...history], stream: false, temperature: 0.7, max_tokens: 2048 })
            });
            if(!res.ok) { const err = await res.json(); throw new Error(err.error?.message || `HTTP ${res.status}`); }
            const data = await res.json();
            const reply = data.choices[0].message.content;
            addMessageToCurrent('assistant', reply, true);
        } catch(err) { showErrorToast(err.message); }
        finally { isLoading = false; sendBtn.disabled = false; removeLoading(); }
    }

    function addMessageToCurrent(role, content, save = true) {
        if(!currentConvId) return;
        const conv = conversations[currentConvId];
        const newMsg = { role, content, time: getCurrentTimeString() };
        if(save) { conv.messages.push(newMsg); conv.updatedAt = Date.now(); saveAll(); }
        renderCurrentChat();
        if(role === 'user' && conv.title === '新对话' || conv.title.startsWith('新对话')) {
            conv.title = content.length > 18 ? content.slice(0,18)+'..' : content;
            saveAll(); renderConvList();
        }
        scrollToBottom();
    }

    async function sendMessage() {
        if(isLoading) { showErrorToast("请等待回复完成"); return; }
        let raw = userInput.value.trim();
        if(!raw) return;
        if(!apiKeyInput.value.trim()) { showErrorToast("请设置 API Key"); return; }
        userInput.value = ''; userInput.style.height = 'auto';
        addMessageToCurrent('user', raw, true);
        await callAndAddAssistant();
    }

    let loadingIndicator = null;
    function showLoading() {
        if(loadingIndicator) removeLoading();
        const div = document.createElement('div'); div.className = 'message assistant'; div.id = 'loadingMsg';
        div.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div><div class="msg-time">AI 思考中...</div>`;
        chatArea.appendChild(div); loadingIndicator = div; scrollToBottom();
    }
    function removeLoading() { if(loadingIndicator && loadingIndicator.parentNode) loadingIndicator.remove(); loadingIndicator = null; }
    function showErrorToast(msg) {
        removeLoading();
        const errDiv = document.createElement('div'); errDiv.className = 'error-tip'; errDiv.innerText = `⚠️ ${msg}`;
        chatArea.appendChild(errDiv); setTimeout(() => errDiv.remove(), 4000); scrollToBottom();
    }
    function scrollToBottom() { setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50); }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }
    function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); }

    // 保存API Key和模型
    apiKeyInput.value = localStorage.getItem('deepseek_api_key_v2') || '';
    modelSelect.value = localStorage.getItem('deepseek_model_v2') || 'deepseek-chat';
    apiKeyInput.addEventListener('input', () => localStorage.setItem('deepseek_api_key_v2', apiKeyInput.value));
    modelSelect.addEventListener('change', () => localStorage.setItem('deepseek_model_v2', modelSelect.value));

    newChatBtn.addEventListener('click', () => createNewConversation('新对话'));
    toggleSidebarBtn.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });

    initDarkMode();
    loadConversations();
</script>
</body>
</html>
