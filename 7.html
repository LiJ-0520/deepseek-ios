<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek AI · 完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-gradient-start: #f5f7fc; --bg-gradient-end: #eef2f8; --card-bg: rgba(255,255,255,0.92);
            --sidebar-bg: rgba(255,255,255,0.96); --border-color: #eef2f8; --text-primary: #1f2a44;
            --text-secondary: #5e6f8d; --bubble-user: #1e6f5c; --bubble-user-text: white;
            --bubble-assistant: #eff3f8; --bubble-assistant-text: #1a2c3e; --input-bg: #ffffff;
            --input-border: #dce5ec; --button-primary: #1e6f5c; --conv-item-bg: #f8fafd;
            --conv-active-bg: #e6f4f0; --code-bg: #2d2d2d; --search-bg: #ffffff;
        }
        body.dark {
            --bg-gradient-start: #1a1e2c; --bg-gradient-end: #0f1119; --card-bg: rgba(30,34,48,0.95);
            --sidebar-bg: #1e2230; --border-color: #2a2e3e; --text-primary: #eef2ff;
            --text-secondary: #9aa4bf; --bubble-user: #2d8f7a; --bubble-user-text: white;
            --bubble-assistant: #2a2e3e; --bubble-assistant-text: #e2e8f0; --input-bg: #25293b;
            --input-border: #3a3f54; --button-primary: #2d8f7a; --conv-item-bg: #25293b;
            --conv-active-bg: #2d3b3a; --code-bg: #1e1e1e; --search-bg: #25293b;
        }
        body { background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; padding: 16px 12px 24px; min-height: 100vh; }
        .app-layout { max-width: 1200px; margin: 0 auto; display: flex; gap: 16px; flex-wrap: wrap; }
        .conversation-sidebar { background: var(--sidebar-bg); border-radius: 32px; width: 300px; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border-color); }
        .sidebar-header { padding: 18px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .sidebar-header h3 { font-size: 1.1rem; color: var(--text-primary); }
        .new-theme-btn { background: var(--button-primary); border: none; color: white; padding: 8px 14px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .search-box { padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        .search-box input { width: 100%; padding: 10px 14px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--search-bg); color: var(--text-primary); font-size: 0.8rem; }
        .conversation-list { flex: 1; overflow-y: auto; max-height: 55vh; padding: 8px 0; }
        .theme-item { padding: 14px 16px; margin: 4px 10px; border-radius: 24px; background: var(--conv-item-bg); cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .theme-item.active { background: var(--conv-active-bg); border: 1px solid var(--button-primary); }
        .theme-title { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .theme-delete, .theme-rename { background: none; border: none; font-size: 1rem; color: var(--text-secondary); cursor: pointer; padding: 0 4px; }
        .search-result-highlight { background: #ffeb3b; color: #1a2c3e; border-radius: 4px; }
        body.dark .search-result-highlight { background: #f9a825; color: #1a1e2c; }
        .chat-main { flex: 1; min-width: 260px; background: var(--card-bg); backdrop-filter: blur(2px); border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; }
        .settings-bar { background: var(--input-bg); padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; flex-wrap: wrap; align-items: center; gap: 12px; justify-content: space-between; }
        .api-simple { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .api-simple input, .model-select { padding: 8px 12px; border-radius: 40px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 0.8rem; }
        .action-buttons { display: flex; gap: 8px; }
        .icon-btn, .dark-mode-toggle, .sidebar-toggle { background: var(--conv-item-bg); border: 1px solid var(--border-color); border-radius: 40px; padding: 8px 14px; cursor: pointer; font-size: 0.8rem; color: var(--text-primary); }
        .chat-area { background: var(--card-bg); padding: 20px 16px; height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeSlideUp 0.2s ease; }
        .message.user { align-items: flex-end; align-self: flex-end; }
        .message.assistant { align-items: flex-start; align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 24px; font-size: 0.95rem; line-height: 1.45; word-break: break-word; }
        .user .bubble { background: var(--bubble-user); color: var(--bubble-user-text); border-bottom-right-radius: 6px; }
        .assistant .bubble { background: var(--bubble-assistant); color: var(--bubble-assistant-text); border-bottom-left-radius: 6px; }
        .assistant .bubble pre { background: var(--code-bg); border-radius: 12px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        .assistant .bubble code { font-family: monospace; font-size: 0.85rem; }
        .msg-time { font-size: 0.65rem; color: var(--text-secondary); margin-top: 5px; margin-left: 8px; margin-right: 8px; }
        .msg-actions { display: flex; gap: 8px; margin-top: 4px; margin-left: 12px; flex-wrap: wrap; }
        .msg-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; }
        .version-badge { font-size: 0.6rem; background: var(--conv-item-bg); padding: 2px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; }
        .context-menu { position: fixed; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 8px 0; z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); min-width: 150px; }
        .context-menu div { padding: 10px 16px; cursor: pointer; font-size: 0.85rem; color: var(--text-primary); }
        .context-menu div:hover { background: var(--conv-active-bg); }
        .input-bar { padding: 16px 20px 24px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: flex-end; background: var(--card-bg); }
        .input-bar textarea { flex: 1; border: 1px solid var(--border-color); border-radius: 30px; padding: 12px 18px; font-family: inherit; font-size: 0.95rem; resize: none; background: var(--input-bg); color: var(--text-primary); }
        .input-bar button { background: var(--button-primary); border: none; color: white; width: 48px; height: 48px; border-radius: 40px; cursor: pointer; }
        .stop-btn { background: #e35f5f !important; }
        .typing-indicator { background: var(--bubble-assistant); padding: 12px 18px; border-radius: 24px; display: inline-flex; gap: 6px; }
        @keyframes pulse { 0%,80%,100%{transform:scale(0.6); opacity:0.5;} 40%{transform:scale(1); opacity:1;} }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--button-primary); color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 1000; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .version-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .version-panel { background: var(--card-bg); border-radius: 28px; padding: 20px; max-width: 90%; width: 360px; max-height: 70%; overflow: auto; border: 1px solid var(--border-color); }
        .version-item { padding: 12px; margin: 8px 0; border-radius: 16px; cursor: pointer; background: var(--conv-item-bg); color: var(--text-primary); }
        .version-item.active { background: var(--button-primary); color: white; }
        @media (max-width: 680px) { .sidebar-toggle { display: inline-block; } .conversation-sidebar { position: fixed; top: 0; left: -300px; z-index: 1000; height: 100vh; transition: left 0.2s; width: 300px; } .conversation-sidebar.open { left: 0; } .sidebar-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index: 999; display: none; } .sidebar-overlay.open { display: block; } }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="conversation-sidebar" id="sidebar">
        <div class="sidebar-header"><h3>📋 对话主题</h3><button class="new-theme-btn" id="newThemeBtn">+ 新建</button></div>
        <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 搜索历史对话..."></div>
        <div class="conversation-list" id="themeList"></div>
    </div>
    <div class="chat-main">
        <div class="settings-bar">
            <div class="api-simple"><input type="password" id="apiKeyInput" placeholder="DeepSeek API Key"><select id="modelSelect"><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-coder">deepseek-coder</option></select></div>
            <div class="action-buttons"><button class="icon-btn" id="copyConversationBtn">📋 复制对话</button><button class="dark-mode-toggle" id="darkModeToggle">🌙 夜间</button><button class="sidebar-toggle" id="toggleSidebarBtn">📋 主题</button></div>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="input-bar"><textarea id="userInput" rows="1" placeholder="输入消息..."></textarea><button id="sendBtn">➤</button><button id="stopBtn" style="display:none;" class="stop-btn">⏹️ 停止</button></div>
        <div class="footer-note">💡 长按消息：编辑/复制/引用/删除 | 点击版本号查看历史版本 | 侧边栏搜索对话 | 支持Markdown+代码高亮</div>
    </div>
</div>
<script>
    let themes = {}, currentThemeId = null, isLoading = false, currentAbortController = null, searchKeyword = '';
    
    const apiKeyInput = document.getElementById('apiKeyInput'), modelSelect = document.getElementById('modelSelect'), chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput'), sendBtn = document.getElementById('sendBtn'), stopBtn = document.getElementById('stopBtn');
    const themeListDiv = document.getElementById('themeList'), newThemeBtn = document.getElementById('newThemeBtn'), toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const sidebarOverlay = document.getElementById('sidebarOverlay'), sidebar = document.getElementById('sidebar'), darkModeToggle = document.getElementById('darkModeToggle');
    const copyConversationBtn = document.getElementById('copyConversationBtn'), searchInput = document.getElementById('searchInput');
    
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    function toast(msg) { let t = document.querySelector('.toast-msg'); if(t) t.remove(); t = document.createElement('div'); t.className = 'toast-msg'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function renderMarkdown(content) { try { return marked.parse(content); } catch(e) { return escapeHtml(content); } }
    function highlightText(text, keyword) { if(!keyword) return escapeHtml(text); let escaped = escapeHtml(text); let reg = new RegExp(`(${escapeRegex(keyword)})`, 'gi'); return escaped.replace(reg, '<span class="search-result-highlight">$1</span>'); }
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    
    function initDarkMode() { if(localStorage.getItem('dark_mode') === 'enabled') { document.body.classList.add('dark'); darkModeToggle.textContent = '☀️ 日间'; } else darkModeToggle.textContent = '🌙 夜间'; }
    function toggleDarkMode() { if(document.body.classList.contains('dark')) { document.body.classList.remove('dark'); localStorage.setItem('dark_mode', 'disabled'); darkModeToggle.textContent = '🌙 夜间'; } else { document.body.classList.add('dark'); localStorage.setItem('dark_mode', 'enabled'); darkModeToggle.textContent = '☀️ 日间'; } }
    darkModeToggle.addEventListener('click', toggleDarkMode);
    
    function saveAll() { localStorage.setItem('deepseek_themes_v10', JSON.stringify(themes)); localStorage.setItem('deepseek_current_theme_v10', currentThemeId); }
    function loadData() {
        let stored = localStorage.getItem('deepseek_themes_v10');
        if(stored) { try { themes = JSON.parse(stored); } catch(e){} }
        let savedTheme = localStorage.getItem('deepseek_current_theme_v10');
        if(savedTheme && themes[savedTheme]) currentThemeId = savedTheme;
        if(Object.keys(themes).length === 0) createNewTheme();
        else if(!currentThemeId) currentThemeId = Object.keys(themes)[0];
        renderThemeList(); renderCurrentChat();
    }
    function createNewTheme(title='新对话') { let id = genId(); themes[id] = { id, title: title + '_' + (Object.keys(themes).length+1), messages: [], updatedAt: Date.now() }; currentThemeId = id; saveAll(); renderThemeList(); renderCurrentChat(); closeSidebar(); }
    function deleteTheme(themeId) { if(Object.keys(themes).length === 1) { createNewTheme(); delete themes[themeId]; } else delete themes[themeId]; if(currentThemeId === themeId) currentThemeId = Object.keys(themes)[0]; saveAll(); renderThemeList(); renderCurrentChat(); }
    function renameTheme(themeId) { let newName = prompt('新名称:', themes[themeId].title); if(newName && newName.trim()) { themes[themeId].title = newName.trim(); saveAll(); renderThemeList(); } }
    function getCurrentMessages() { return themes[currentThemeId]?.messages || []; }
    function saveCurrentMessages(messages) { themes[currentThemeId].messages = messages; themes[currentThemeId].updatedAt = Date.now(); saveAll(); }
    
    function renderThemeList() {
        let filtered = Object.values(themes).filter(t => !searchKeyword || t.title.toLowerCase().includes(searchKeyword.toLowerCase()) || t.messages.some(m => m.content.toLowerCase().includes(searchKeyword.toLowerCase())));
        themeListDiv.innerHTML = '';
        filtered.sort((a,b)=>b.updatedAt - a.updatedAt).forEach(theme => {
            let div = document.createElement('div'); div.className = 'theme-item' + (currentThemeId === theme.id ? ' active' : '');
            div.innerHTML = `<div class="theme-title">${highlightText(theme.title, searchKeyword)}</div><div><button class="theme-rename" data-id="${theme.id}">✏️</button><button class="theme-delete" data-id="${theme.id}">🗑️</button></div>`;
            div.addEventListener('click', (e) => { if(e.target.classList.contains('theme-delete') || e.target.classList.contains('theme-rename')) return; currentThemeId = theme.id; saveAll(); renderThemeList(); renderCurrentChat(); closeSidebar(); });
            div.querySelector('.theme-rename').addEventListener('click', (e) => { e.stopPropagation(); renameTheme(theme.id); });
            div.querySelector('.theme-delete').addEventListener('click', (e) => { e.stopPropagation(); if(confirm('删除对话？')) deleteTheme(theme.id); });
            themeListDiv.appendChild(div);
        });
    }
    searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; renderThemeList(); });
    
    function renderCurrentChat() {
        if(!currentThemeId || !themes[currentThemeId]) return;
        let messages = getCurrentMessages();
        chatArea.innerHTML = '';
        if(messages.length === 0) { chatArea.innerHTML = `<div class="message assistant"><div class="bubble">✨ 新对话！<br>• 长按消息可编辑/复制/引用/删除<br>• 点击消息旁的版本号可查看历史版本并切换<br>• 侧边栏可搜索历史对话</div><div class="msg-time">${getTime()}</div></div>`; return; }
        for(let i = 0; i < messages.length; i++) {
            let msg = messages[i];
            let msgDiv = document.createElement('div'); msgDiv.className = `message ${msg.role}`; msgDiv.setAttribute('data-index', i);
            let hasVersions = (msg.versions && msg.versions.length > 0) || (msg.assistantVersions && msg.assistantVersions.length > 0);
            let versionCount = 0, currentVer = 0;
            if(msg.role === 'user') { versionCount = msg.versions ? msg.versions.length + 1 : 1; currentVer = msg.currentVersion || 0; }
            else { versionCount = msg.assistantVersions ? msg.assistantVersions.length + 1 : 1; currentVer = msg.currentAssistantVersion || 0; }
            let versionBadge = versionCount > 1 ? `<span class="version-badge" data-index="${i}" data-role="${msg.role}">📜 ${currentVer+1}/${versionCount}</span>` : '';
            let bubbleContent = msg.role === 'assistant' ? renderMarkdown(msg.content) : highlightText(escapeHtml(msg.content), searchKeyword);
            let actionsHtml = `<div class="msg-actions">${versionBadge}<button class="regenerate-or-edit" data-index="${i}" data-role="${msg.role}">${msg.role === 'user' ? '✏️ 编辑' : '🔄 重新生成'}</button></div>`;
            msgDiv.innerHTML = `<div class="bubble">${bubbleContent}</div><div class="msg-time">${msg.time || getTime()}</div>${actionsHtml}`;
            chatArea.appendChild(msgDiv);
        }
        document.querySelectorAll('.version-badge').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); showVersionHistory(parseInt(btn.dataset.index), btn.dataset.role); }));
        document.querySelectorAll('.regenerate-or-edit').forEach(btn => btn.addEventListener('click', () => { let idx = parseInt(btn.dataset.index); if(btn.dataset.role === 'user') editUserMessage(idx); else regenerateAssistantMessage(idx); }));
        attachLongPressEvents();
        if(window.hljs) document.querySelectorAll('.assistant .bubble pre code').forEach(block => hljs.highlightElement(block));
        scrollToBottom();
    }
    
    function showVersionHistory(msgIndex, role) {
        let messages = getCurrentMessages();
        let msg = messages[msgIndex];
        let versions = [];
        let currentVer = 0;
        if(role === 'user') {
            if(!msg.versions) msg.versions = [];
            versions = [msg.content, ...msg.versions];
            currentVer = msg.currentVersion || 0;
        } else {
            if(!msg.assistantVersions) msg.assistantVersions = [];
            versions = [msg.content, ...msg.assistantVersions];
            currentVer = msg.currentAssistantVersion || 0;
        }
        let modal = document.createElement('div'); modal.className = 'version-modal';
        let panel = document.createElement('div'); panel.className = 'version-panel';
        panel.innerHTML = `<h4 style="margin-bottom:12px">📜 历史版本 (${role === 'user' ? '编辑记录' : '重新生成记录'})</h4><div id="versionList"></div><button id="closeVerModal" style="margin-top:16px; padding:10px; width:100%; background:var(--button-primary); border:none; border-radius:40px; color:white; cursor:pointer;">关闭</button>`;
        modal.appendChild(panel); document.body.appendChild(modal);
        let listDiv = panel.querySelector('#versionList');
        versions.forEach((v, idx) => {
            let item = document.createElement('div'); item.className = `version-item ${idx === currentVer ? 'active' : ''}`;
            item.innerHTML = `<strong>版本 ${idx+1}</strong><br><span style="font-size:0.75rem;">${escapeHtml(v.substring(0,150))}${v.length>150?'...':''}</span>`;
            item.addEventListener('click', () => {
                if(role === 'user') {
                    msg.content = v;
                    msg.currentVersion = idx;
                } else {
                    msg.content = v;
                    msg.currentAssistantVersion = idx;
                }
                saveCurrentMessages(messages);
                renderCurrentChat();
                modal.remove();
                toast(`已切换到版本 ${idx+1}`);
            });
            listDiv.appendChild(item);
        });
        document.getElementById('closeVerModal').addEventListener('click', () => modal.remove());
    }
    
    function attachLongPressEvents() {
        document.querySelectorAll('.message').forEach(msgDiv => {
            msgDiv.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e, msgDiv); });
            msgDiv.addEventListener('touchstart', (e) => { let timer = setTimeout(() => { showContextMenu(e, msgDiv); }, 500); msgDiv.addEventListener('touchend', () => clearTimeout(timer), { once: true }); });
        });
    }
    function showContextMenu(e, msgDiv) {
        let existing = document.querySelector('.context-menu'); if(existing) existing.remove();
        let index = parseInt(msgDiv.dataset.index);
        let messages = getCurrentMessages();
        let msg = messages[index];
        let menu = document.createElement('div'); menu.className = 'context-menu';
        let x = e.clientX, y = e.clientY;
        menu.style.left = x + 'px'; menu.style.top = y + 'px';
        let copyDiv = document.createElement('div'); copyDiv.innerText = '📋 复制文本'; copyDiv.onclick = () => { navigator.clipboard.writeText(msg.content); toast('已复制'); menu.remove(); };
        let quoteDiv = document.createElement('div'); quoteDiv.innerText = '💬 引用到输入框'; quoteDiv.onclick = () => { userInput.value = `> ${msg.content}\n\n`; userInput.focus(); menu.remove(); };
        menu.appendChild(copyDiv); menu.appendChild(quoteDiv);
        if(msg.role === 'user') {
            let editDiv = document.createElement('div'); editDiv.innerText = '✏️ 编辑消息'; editDiv.onclick = () => { editUserMessage(index); menu.remove(); };
            let deleteDiv = document.createElement('div'); deleteDiv.innerText = '🗑️ 删除本条及后续'; deleteDiv.onclick = () => { if(confirm('删除本条及之后所有消息？')) { let newMsgs = messages.slice(0, index); saveCurrentMessages(newMsgs); renderCurrentChat(); } menu.remove(); };
            menu.appendChild(editDiv); menu.appendChild(deleteDiv);
        } else {
            let regenDiv = document.createElement('div'); regenDiv.innerText = '🔄 重新生成'; regenDiv.onclick = () => { regenerateAssistantMessage(index); menu.remove(); };
            menu.appendChild(regenDiv);
        }
        document.body.appendChild(menu);
        setTimeout(() => { document.addEventListener('click', () => menu.remove(), { once: true }); }, 100);
    }
    
    async function editUserMessage(idx) {
        if(isLoading) { toast("请等待回复完成"); return; }
        let messages = getCurrentMessages();
        let newContent = prompt("编辑消息:", messages[idx].content);
        if(!newContent || newContent.trim() === '') return;
        // 保存当前版本到历史
        if(!messages[idx].versions) messages[idx].versions = [];
        if(messages[idx].versions[0] !== messages[idx].content) messages[idx].versions.unshift(messages[idx].content);
        messages[idx].content = newContent.trim();
        messages[idx].currentVersion = 0;
        messages[idx].time = getTime();
        // 删除该消息之后的所有消息（因为编辑后需要重新生成）
        let newMsgs = messages.slice(0, idx + 1);
        saveCurrentMessages(newMsgs);
        renderCurrentChat();
        await generateAIForLastUser();
    }
    
    async function regenerateAssistantMessage(assistantIdx) {
        if(isLoading) { toast("请等待回复完成"); return; }
        let messages = getCurrentMessages();
        let userIdx = -1;
        for(let i=assistantIdx-1; i>=0; i--) { if(messages[i].role === 'user') { userIdx = i; break; } }
        if(userIdx === -1) { toast("无法找到用户消息"); return; }
        let assistantMsg = messages[assistantIdx];
        if(!assistantMsg.assistantVersions) assistantMsg.assistantVersions = [];
        if(assistantMsg.assistantVersions[0] !== assistantMsg.content) assistantMsg.assistantVersions.unshift(assistantMsg.content);
        let userContent = messages[userIdx].content;
        let newMsgs = messages.slice(0, userIdx + 1);
        saveCurrentMessages(newMsgs);
        renderCurrentChat();
        addMessageToCurrent('user', userContent);
        await generateAIForLastUser();
    }
    
    async function generateAIForLastUser() {
        let messages = getCurrentMessages();
        let lastUserMsg = messages[messages.length-1];
        if(!lastUserMsg || lastUserMsg.role !== 'user') return;
        let apiKey = apiKeyInput.value.trim(); if(!apiKey) { toast("请填写API Key"); return; }
        let model = modelSelect.value;
        let history = messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
        history.push({ role: "user", content: lastUserMsg.content });
        isLoading = true; sendBtn.disabled = true; stopBtn.style.display = 'inline-block';
        currentAbortController = new AbortController();
        showLoading();
        try {
            let res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model, messages: [{ role:"system", content:"You are a helpful assistant. Use Markdown format with code blocks."}, ...history], stream: false, temperature: 0.7, max_tokens: 2048 }),
                signal: currentAbortController.signal
            });
            if(!res.ok) { let err = await res.json(); throw new Error(err.error?.message || `HTTP ${res.status}`); }
            let data = await res.json();
            let reply = data.choices[0].message.content;
            addMessageToCurrent('assistant', reply);
        } catch(err) { if(err.name !== 'AbortError') toast(err.message); }
        finally { isLoading = false; sendBtn.disabled = false; stopBtn.style.display = 'none'; currentAbortController = null; removeLoading(); }
    }
    
    function addMessageToCurrent(role, content) {
        let messages = getCurrentMessages();
        let newMsg = { role, content, time: getTime() };
        if(role === 'user') { newMsg.versions = []; newMsg.currentVersion = 0; }
        else { newMsg.assistantVersions = []; newMsg.currentAssistantVersion = 0; }
        messages.push(newMsg);
        saveCurrentMessages(messages);
        renderCurrentChat();
        let theme = themes[currentThemeId];
        if(role === 'user' && (theme.title === '新对话' || theme.title.startsWith('新对话'))) {
            theme.title = content.length > 18 ? content.slice(0,18)+'..' : content;
            saveAll(); renderThemeList();
        }
        scrollToBottom();
    }
    
    async function sendNewMessage() {
        if(isLoading) { toast("请等待回复完成或点击停止"); return; }
        let raw = userInput.value.trim(); if(!raw) return;
        if(!apiKeyInput.value.trim()) { toast("请设置 API Key"); return; }
        userInput.value = ''; userInput.style.height = 'auto';
        addMessageToCurrent('user', raw);
        await generateAIForLastUser();
    }
    
    function stopGeneration() { if(currentAbortController) { currentAbortController.abort(); toast("已停止生成"); isLoading = false; sendBtn.disabled = false; stopBtn.style.display = 'none'; removeLoading(); } }
    stopBtn.addEventListener('click', stopGeneration);
    
    function copyConversation() {
        let messages = getCurrentMessages();
        if(messages.length === 0) { toast("当前对话为空"); return; }
        let text = `=== DeepSeek 对话 ===\n主题: ${themes[currentThemeId]?.title}\n时间: ${new Date().toLocaleString()}\n\n`;
        messages.forEach(msg => { let role = msg.role === 'user' ? '👤 我' : '🤖 DeepSeek'; text += `${role} (${msg.time || ''}):\n${msg.content}\n\n`; });
        navigator.clipboard.writeText(text).then(() => toast("✅ 对话已复制")).catch(() => toast("复制失败"));
    }
    copyConversationBtn.addEventListener('click', copyConversation);

    function removeLoading() { if(loadingIndicator && loadingIndicator.parentNode) loadingIndicator.remove(); loadingIndicator = null; }
