<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek AI · 完整功能版</title>
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-gradient-start: #f5f7fc; --bg-gradient-end: #eef2f8; --card-bg: rgba(255,255,255,0.92);
            --sidebar-bg: rgba(255,255,255,0.96); --border-color: #eef2f8; --text-primary: #1f2a44;
            --text-secondary: #5e6f8d; --bubble-user: #1e6f5c; --bubble-user-text: white;
            --bubble-assistant: #eff3f8; --bubble-assistant-text: #1a2c3e; --input-bg: #ffffff;
            --input-border: #dce5ec; --button-primary: #1e6f5c; --button-disabled: #bbcfda;
            --error-bg: #ffe8e6; --error-text: #c23d2e; --footer-text: #9dafc4;
            --conv-item-bg: #f8fafd; --conv-active-bg: #e6f4f0; --code-bg: #2d2d2d;
        }
        body.dark {
            --bg-gradient-start: #1a1e2c; --bg-gradient-end: #0f1119; --card-bg: rgba(30,34,48,0.95);
            --sidebar-bg: #1e2230; --border-color: #2a2e3e; --text-primary: #eef2ff;
            --text-secondary: #9aa4bf; --bubble-user: #2d8f7a; --bubble-user-text: white;
            --bubble-assistant: #2a2e3e; --bubble-assistant-text: #e2e8f0; --input-bg: #25293b;
            --input-border: #3a3f54; --button-primary: #2d8f7a; --button-disabled: #3a4055;
            --error-bg: #3b2a2a; --error-text: #f9a69a; --footer-text: #6e768f;
            --conv-item-bg: #25293b; --conv-active-bg: #2d3b3a; --code-bg: #1e1e1e;
        }
        body { background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; padding: 16px 12px 24px; min-height: 100vh; transition: background 0.2s; }
        .app-layout { max-width: 1200px; margin: 0 auto; display: flex; gap: 16px; flex-wrap: wrap; }
        .conversation-sidebar { background: var(--sidebar-bg); backdrop-filter: blur(8px); border-radius: 32px; width: 280px; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border-color); }
        .sidebar-header { padding: 18px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h3 { font-size: 1.1rem; color: var(--text-primary); }
        .new-chat-btn { background: var(--button-primary); border: none; color: white; padding: 8px 14px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .conversation-list { flex: 1; overflow-y: auto; max-height: 65vh; padding: 8px 0; }
        .conv-item { padding: 14px 16px; margin: 4px 10px; border-radius: 24px; background: var(--conv-item-bg); cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .conv-item.active { background: var(--conv-active-bg); border: 1px solid var(--button-primary); }
        .conv-title { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .conv-delete { background: none; border: none; font-size: 1.2rem; color: var(--text-secondary); cursor: pointer; }
        .chat-main { flex: 1; min-width: 260px; background: var(--card-bg); backdrop-filter: blur(2px); border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; }
        .settings-bar { background: var(--input-bg); padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; flex-wrap: wrap; align-items: center; gap: 12px; justify-content: space-between; }
        .api-simple { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .api-simple input, .model-select { padding: 8px 12px; border-radius: 40px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 0.8rem; }
        .action-buttons { display: flex; gap: 8px; }
        .icon-btn, .dark-mode-toggle, .sidebar-toggle { background: var(--conv-item-bg); border: 1px solid var(--border-color); border-radius: 40px; padding: 8px 14px; cursor: pointer; font-size: 0.8rem; color: var(--text-primary); }
        .chat-area { background: var(--card-bg); padding: 20px 16px; height: 460px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeSlideUp 0.2s ease; position: relative; }
        .message.user { align-items: flex-end; align-self: flex-end; }
        .message.assistant { align-items: flex-start; align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 24px; font-size: 0.95rem; line-height: 1.45; word-break: break-word; }
        .user .bubble { background: var(--bubble-user); color: var(--bubble-user-text); border-bottom-right-radius: 6px; }
        .assistant .bubble { background: var(--bubble-assistant); color: var(--bubble-assistant-text); border-bottom-left-radius: 6px; }
        .assistant .bubble pre { background: var(--code-bg); border-radius: 12px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        .assistant .bubble code { font-family: monospace; font-size: 0.85rem; }
        .assistant .bubble pre code { background: none; padding: 0; }
        .msg-time { font-size: 0.65rem; color: var(--text-secondary); margin-top: 5px; margin-left: 8px; margin-right: 8px; }
        .msg-actions { display: flex; gap: 8px; margin-top: 4px; margin-left: 12px; font-size: 0.7rem; flex-wrap: wrap; }
        .msg-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; }
        .msg-actions button:active { background: var(--conv-item-bg); }
        .context-menu { position: fixed; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 8px 0; z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); min-width: 140px; }
        .context-menu div { padding: 10px 16px; cursor: pointer; font-size: 0.85rem; color: var(--text-primary); }
        .context-menu div:hover { background: var(--conv-active-bg); }
        .input-bar { padding: 16px 20px 24px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: flex-end; background: var(--card-bg); }
        .input-bar textarea { flex: 1; border: 1px solid var(--input-border); border-radius: 30px; padding: 12px 18px; font-family: inherit; font-size: 0.95rem; resize: none; background: var(--input-bg); color: var(--text-primary); }
        .input-bar button { background: var(--button-primary); border: none; color: white; width: 48px; height: 48px; border-radius: 40px; cursor: pointer; }
        .input-bar button:disabled { background: var(--button-disabled); }
        .stop-btn { background: #e35f5f !important; }
        .typing-indicator { background: var(--bubble-assistant); padding: 12px 18px; border-radius: 24px; display: inline-flex; gap: 6px; }
        .typing-indicator span { width: 8px; height: 8px; background: var(--text-secondary); border-radius: 50%; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0%,80%,100%{transform:scale(0.6); opacity:0.5;} 40%{transform:scale(1); opacity:1;} }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--button-primary); color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 1000; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .branch-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .branch-panel { background: var(--card-bg); border-radius: 28px; padding: 20px; max-width: 90%; width: 320px; border: 1px solid var(--border-color); }
        @media (max-width: 680px) { .sidebar-toggle { display: inline-block; } .conversation-sidebar { position: fixed; top: 0; left: -280px; z-index: 1000; height: 100vh; border-radius: 0; transition: left 0.2s; width: 280px; background: var(--sidebar-bg); } .conversation-sidebar.open { left: 0; } .sidebar-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index: 999; display: none; } .sidebar-overlay.open { display: block; } }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="conversation-sidebar" id="sidebar">
        <div class="sidebar-header"><h3>📋 对话列表</h3><button class="new-chat-btn" id="newChatBtn">+ 新建</button></div>
        <div class="conversation-list" id="convList"></div>
    </div>
    <div class="chat-main">
        <div class="settings-bar">
            <div class="api-simple"><input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" style="width:180px;"><select id="modelSelect"><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-coder">deepseek-coder</option></select></div>
            <div class="action-buttons"><button class="icon-btn" id="copyConversationBtn">📋 复制对话</button><button class="dark-mode-toggle" id="darkModeToggle">🌙 夜间模式</button><button class="sidebar-toggle" id="toggleSidebarBtn">📋 列表</button></div>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="input-bar"><textarea id="userInput" rows="1" placeholder="输入消息..."></textarea><button id="sendBtn">➤</button><button id="stopBtn" style="display:none;" class="stop-btn">⏹️ 停止</button></div>
        <div class="footer-note">💡 长按消息：编辑/复制/引用/删除 | AI消息旁：🔄重新生成 🌿分支 | 支持Markdown+代码高亮</div>
    </div>
</div>
<script>
    let conversations = {}, currentConvId = null, isLoading = false, currentAbortController = null;
    const apiKeyInput = document.getElementById('apiKeyInput'), modelSelect = document.getElementById('modelSelect'), chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput'), sendBtn = document.getElementById('sendBtn'), stopBtn = document.getElementById('stopBtn');
    const convListDiv = document.getElementById('convList'), newChatBtn = document.getElementById('newChatBtn'), toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const sidebarOverlay = document.getElementById('sidebarOverlay'), sidebar = document.getElementById('sidebar'), darkModeToggle = document.getElementById('darkModeToggle'), copyConversationBtn = document.getElementById('copyConversationBtn');
    
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : ''; }
    function toast(msg) { let t = document.querySelector('.toast-msg'); if(t) t.remove(); t = document.createElement('div'); t.className = 'toast-msg'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    
    function renderMarkdown(content) { try { return marked.parse(content); } catch(e) { return escapeHtml(content); } }
    
    function initDarkMode() { if(localStorage.getItem('dark_mode') === 'enabled') { document.body.classList.add('dark'); darkModeToggle.textContent = '☀️ 日间'; } else darkModeToggle.textContent = '🌙 夜间'; }
    function toggleDarkMode() { if(document.body.classList.contains('dark')) { document.body.classList.remove('dark'); localStorage.setItem('dark_mode', 'disabled'); darkModeToggle.textContent = '🌙 夜间'; } else { document.body.classList.add('dark'); localStorage.setItem('dark_mode', 'enabled'); darkModeToggle.textContent = '☀️ 日间'; } }
    darkModeToggle.addEventListener('click', toggleDarkMode);
    
    function saveAll() { localStorage.setItem('deepseek_conversations_v8', JSON.stringify(conversations)); localStorage.setItem('deepseek_current_conv_v8', currentConvId); }
    function loadConversations() {
        let stored = localStorage.getItem('deepseek_conversations_v8');
        if(stored) { try { conversations = JSON.parse(stored); } catch(e){} }
        let savedCurr = localStorage.getItem('deepseek_current_conv_v8');
        if(savedCurr && conversations[savedCurr]) currentConvId = savedCurr;
        if(Object.keys(conversations).length === 0) createNewConv();
        else if(!currentConvId) currentConvId = Object.keys(conversations)[0];
        renderConvList(); renderCurrentChat();
    }
    function createNewConv(title='新对话') { let id = genId(); conversations[id] = { id, title: title + '_' + (Object.keys(conversations).length+1), messages: [], updatedAt: Date.now() }; currentConvId = id; saveAll(); renderConvList(); renderCurrentChat(); closeSidebar(); }
    function deleteConv(convId) { if(Object.keys(conversations).length === 1) { createNewConv(); delete conversations[convId]; } else delete conversations[convId]; if(currentConvId === convId) currentConvId = Object.keys(conversations)[0]; saveAll(); renderConvList(); renderCurrentChat(); }
    function renderConvList() { convListDiv.innerHTML = ''; Object.values(conversations).sort((a,b)=>b.updatedAt - a.updatedAt).forEach(conv => { let div = document.createElement('div'); div.className = 'conv-item' + (currentConvId === conv.id ? ' active' : ''); div.innerHTML = `<div class="conv-title">${escapeHtml(conv.title)}</div><button class="conv-delete" data-id="${conv.id}">🗑️</button>`; div.addEventListener('click', (e) => { if(e.target.classList.contains('conv-delete')) return; currentConvId = conv.id; saveAll(); renderConvList(); renderCurrentChat(); closeSidebar(); }); div.querySelector('.conv-delete').addEventListener('click', (e) => { e.stopPropagation(); if(confirm('删除对话？')) deleteConv(conv.id); }); convListDiv.appendChild(div); }); }
    
    function copyConversation() { let conv = conversations[currentConvId]; if(!conv || conv.messages.length === 0) { toast("当前对话为空"); return; } let text = `=== DeepSeek 对话 ===\n时间: ${new Date().toLocaleString()}\n\n`; conv.messages.forEach(msg => { let role = msg.role === 'user' ? '👤 我' : '🤖 DeepSeek'; text += `${role} (${msg.time || ''}):\n${msg.content}\n\n`; }); navigator.clipboard.writeText(text).then(() => toast("✅ 对话已复制")).catch(() => toast("复制失败")); }
    copyConversationBtn.addEventListener('click', copyConversation);
    
    function renderCurrentChat() {
        if(!currentConvId || !conversations[currentConvId]) return;
        let conv = conversations[currentConvId];
        chatArea.innerHTML = '';
        for(let i = 0; i < conv.messages.length; i++) {
            let msg = conv.messages[i];
            let msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role}`;
            msgDiv.setAttribute('data-index', i);
            let bubbleContent = msg.role === 'assistant' ? renderMarkdown(msg.content) : escapeHtml(msg.content);
            let actionsHtml = `<div class="msg-actions">`;
            if(msg.role === 'user') {
                actionsHtml += `<button class="branch-from-msg" data-index="${i}">🌿 从此分支</button>`;
            } else {
                actionsHtml += `<button class="regenerate-msg" data-index="${i}">🔄 重新生成</button><button class="branch-from-msg" data-index="${i}">🌿 分支对话</button>`;
            }
            actionsHtml += `</div>`;
            msgDiv.innerHTML = `<div class="bubble">${bubbleContent}</div><div class="msg-time">${msg.time || getTime()}</div>${actionsHtml}`;
            chatArea.appendChild(msgDiv);
        }
        document.querySelectorAll('.regenerate-msg').forEach(btn => btn.addEventListener('click', () => regenerateMessage(parseInt(btn.dataset.index))));
        document.querySelectorAll('.branch-from-msg').forEach(btn => btn.addEventListener('click', () => createBranch(parseInt(btn.dataset.index))));
        attachLongPressEvents();
        if(window.hljs) document.querySelectorAll('.assistant .bubble pre code').forEach(block => hljs.highlightElement(block));
        scrollToBottom();
    }
    
    function attachLongPressEvents() {
        document.querySelectorAll('.message').forEach(msgDiv => {
            msgDiv.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e, msgDiv); });
            msgDiv.addEventListener('touchstart', (e) => { let timer = setTimeout(() => { showContextMenu(e, msgDiv); }, 500); msgDiv.addEventListener('touchend', () => clearTimeout(timer), { once: true }); });
        });
    }
    function showContextMenu(e, msgDiv) {
        let existing = document.querySelector('.context-menu'); if(existing) existing.remove();
        let index = parseInt(msgDiv.dataset.index);
        let conv = conversations[currentConvId];
        let msg = conv.messages[index];
        let menu = document.createElement('div'); menu.className = 'context-menu';
        let x = e.clientX, y = e.clientY;
        menu.style.left = x + 'px'; menu.style.top = y + 'px';
        if(msg.role === 'user') {
            let editDiv = document.createElement('div'); editDiv.innerText = '✏️ 编辑消息'; editDiv.onclick = () => { editUserMessage(index); menu.remove(); };
            let copyDiv = document.createElement('div'); copyDiv.innerText = '📋 复制文本'; copyDiv.onclick = () => { navigator.clipboard.writeText(msg.content); toast('已复制'); menu.remove(); };
            let quoteDiv = document.createElement('div'); quoteDiv.innerText = '💬 引用到输入框'; quoteDiv.onclick = () => { userInput.value = `> ${msg.content}\n\n`; userInput.focus(); menu.remove(); };
            let deleteDiv = document.createElement('div'); deleteDiv.innerText = '🗑️ 删除本条及后续'; deleteDiv.onclick = () => { if(confirm('删除本条及之后所有消息？')) { conv.messages = conv.messages.slice(0, index); saveAll(); renderCurrentChat(); } menu.remove(); };
            menu.appendChild(editDiv); menu.appendChild(copyDiv); menu.appendChild(quoteDiv); menu.appendChild(deleteDiv);
        } else {
            let copyDiv = document.createElement('div'); copyDiv.innerText = '📋 复制文本'; copyDiv.onclick = () => { navigator.clipboard.writeText(msg.content); toast('已复制'); menu.remove(); };
            let copyCodeDiv = document.createElement('div'); copyCodeDiv.innerText = '📋 复制代码块'; copyCodeDiv.onclick = () => { let codes = msg.content.match(/```[\s\S]*?```/g); if(codes) navigator.clipboard.writeText(codes.join('\n\n')).then(() => toast('已复制代码')); else toast('无代码块'); menu.remove(); };
            menu.appendChild(copyDiv); menu.appendChild(copyCodeDiv);
        }
        document.body.appendChild(menu);
        setTimeout(() => { document.addEventListener('click', () => menu.remove(), { once: true }); }, 100);
    }
    
    async function editUserMessage(idx) {
        if(isLoading) { toast("请等待回复完成"); return; }
        let conv = conversations[currentConvId];
        let newContent = prompt("编辑消息:", conv.messages[idx].content);
        if(!newContent || newContent.trim() === '') return;
        conv.messages = conv.messages.slice(0, idx);
        saveAll(); renderCurrentChat();
        let newUserMsg = { role: 'user', content: newContent.trim(), time: getTime() };
        conv.messages.push(newUserMsg); saveAll(); renderCurrentChat();
        await generateAIForLastUser();
    }
    
    async function generateAIForLastUser() {
        let conv = conversations[currentConvId];
        let lastUserMsg = conv.messages[conv.messages.length-1];
        if(!lastUserMsg || lastUserMsg.role !== 'user') return;
        let apiKey = apiKeyInput.value.trim(); if(!apiKey) { toast("请填写API Key"); return; }
        let model = modelSelect.value;
        let history = conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
        history.push({ role: "user", content: lastUserMsg.content });
        isLoading = true; sendBtn.disabled = true; stopBtn.style.display = 'inline-block';
        currentAbortController = new AbortController();
        showLoading();
        try {
            let res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model, messages: [{ role:"system", content:"You are a helpful assistant. Use Markdown format with code blocks."}, ...history], stream: false, temperature: 0.7, max_tokens: 2048 }),
                signal: currentAbortController.signal
            });
            if(!res.ok) { let err = await res.json(); throw new Error(err.error?.message || `HTTP ${res.status}`); }
            let data = await res.json();
            let reply = data.choices[0].message.content;
            conv.messages.push({ role: 'assistant', content: reply, time: getTime() });
            conv.updatedAt = Date.now(); saveAll(); renderCurrentChat();
        } catch(err) { if(err.name !== 'AbortError') toast(err.message); }
        finally { isLoading = false; sendBtn.disabled = false; stopBtn.style.display = 'none'; currentAbortController = null; removeLoading(); }
    }
    
    async function regenerateMessage(assistantIdx) {
        if(isLoading) { toast("请等待回复完成"); return; }
        let conv = conversations[currentConvId];
        let userIdx = -1;
        for(let i=assistantIdx-1; i>=0; i--) { if(conv.messages[i].role === 'user') { userIdx = i; break; } }
        if(userIdx === -1) { toast("无法找到用户消息"); return; }
        let userContent = conv.messages[userIdx].content;
        conv.messages = conv.messages.slice(0, userIdx);
        saveAll(); renderCurrentChat();
        conv.messages.push({ role: 'user', content: userContent, time: getTime() });
        saveAll(); renderCurrentChat();
        await generateAIForLastUser();
    }
    
    async function createBranch(msgIndex) {
        if(isLoading) { toast("请等待回复完成"); return; }
        let conv = conversations[currentConvId];
        let newConvId = genId();
        let branchMessages = conv.messages.slice(0, msgIndex + 1);
        let branchTitle = `分支_${new Date().toLocaleTimeString()}`;
        conversations[newConvId] = { id: newConvId, title: branchTitle, messages: JSON.parse(JSON.stringify(branchMessages)), updatedAt: Date.now() };
        currentConvId = newConvId;
        saveAll(); renderConvList(); renderCurrentChat(); closeSidebar();
        toast("✅ 已创建分支对话，可在侧边栏切换");
    }
    
    async function sendNewMessage() {
        if(isLoading) { toast("请等待回复完成或点击停止"); return; }
        let raw = userInput.value.trim(); if(!raw) return;
        if(!apiKeyInput.value.trim()) { toast("请设置 API Key"); return; }
        userInput.value = ''; userInput.style.height = 'auto';
        let conv = conversations[currentConvId];
        conv.messages.push({ role: 'user', content: raw, time: getTime() });
        saveAll(); renderCurrentChat();
        await generateAIForLastUser();
        if(conv.title === '新对话' || conv.title.startsWith('新对话')) {
            conv.title = raw.length > 18 ? raw.slice(0,18)+'..' : raw;
            saveAll(); renderConvList();
        }
    }
    
    function stopGeneration() { if(currentAbortController) { currentAbortController.abort(); toast("已停止生成"); isLoading = false; sendBtn.disabled = false; stopBtn.style.display = 'none'; removeLoading(); } }
    stopBtn.addEventListener('click', stopGeneration);
    
    let loadingIndicator = null;
    function showLoading() { if(loadingIndicator) removeLoading(); let div = document.createElement('div'); div.className = 'message assistant'; div.id = 'loadingMsg'; div.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div><div class="msg-time">AI 思考中...</div>`; chatArea.appendChild(div); loadingIndicator = div; scrollToBottom(); }
    function removeLoading() { if(loadingIndicator && loadingIndicator.parentNode) loadingIndicator.remove(); loadingIndicator = null; }
    function scrollToBottom() { setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50); }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }
    function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); }
    
    apiKeyInput.value = localStorage.getItem('deepseek_api_key_v8') || '';
    modelSelect.value = localStorage.getItem('deepseek_model_v8') || 'deepseek-chat';
    apiKeyInput.addEventListener('input', () => localStorage.setItem('deepseek_api_key_v8', apiKeyInput.value));
    modelSelect.addEventListener('change', () => localStorage.setItem('deepseek_model_v8', modelSelect.value));
    newChatBtn.addEventListener('click', () => createNewConv());
    toggleSidebarBtn.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    sendBtn.addEventListener('click', sendNewMessage);
    userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNewMessage(); } });
    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
    initDarkMode();
    loadConversations();
</script>
</body>
</html>
